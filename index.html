<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <audio id="bgMusic" loop>
    <source src="edit-excursion-2.wav" type="audio/wav">
</audio>
<script src="audio.js"></script>

        new AudioPlayer();

    <style> 
        body {
            margin: 0;
           
            background-color: #1e1e1e;
            font-family: Arial, sans-serif;
        }
        .video-grid {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
            position: relative; /* Add this */
        }
        .video-container {
            position: relative;
            flex: 1;
            height: 100vh;
            cursor: pointer;
            transition: transform 0.3s ease;
            transform-origin: center; /* Add this */
            z-index: 1;
        }
     
        .video-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            transition: background-color 0.3s ease;
        }
        .video-container:hover {
            transform: scale(1.02);
        }
        .video-container:hover::after {
            background-color: rgba(0, 0, 0, 0.3);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .nav-buttons {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 20px;
     }
   
    .custom-button {
        box-shadow: rgb(133, 230, 4) 0px 0px 41px, rgb(141, 166, 67) 0px 0px 0px inset;
        background-color: rgb(4, 50, 255);
        color: rgb(212, 251, 120);
        border-color: rgb(0, 252, 255);
        border-width: 10px;
        border-radius: 9px;
        border-style: dashed;
        width: 130px;
        height: 51px;
        transform: scale(1.2);
         font-size: 15px;
    padding: 5px 10px 20px;
    margin: 5%;
        transition: all 200ms ease-in-out;
    }

    .custom-button:hover {
        box-shadow: inset 1px 1px 10px rgba(217, 217, 217, 0.897);
        border-color: rgb(255, 0, 208);
    }
    </style>
</head>

<body>
    <div class="video-grid">
        <div class="video-container" onclick="window.location.href='stone.html'">
            <video autoplay muted loop>
                <source src="stone-museum.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-container" onclick="window.location.href='photos.html'">
            <video autoplay muted loop>
                <source src="htp-video.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-container" onclick="window.location.href='model.html'">
            <video autoplay muted loop>

            </video>
        </div>
        <div class="video-container" onclick="window.location.href='collage.html'">
            <video autoplay muted loop>
                <source src="photoss.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="custom-button" onclick="window.location.href='index2.html'">???</button>
    </div>
</body>

</html>
